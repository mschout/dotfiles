// Enable firefox sync
defaultPref("identity.fxaccounts.enabled", true);

// This is annoying AF.  In normal FF, network.lna.etp.enabled=false will set
// lna.blocking=false, but not librewolf.  This works for now.
defaultPref("network.lna.etp.enabled", false);
defaultPref("network.lna.blocking", false);

// Retain browser and download history on shutdown
defaultPref("privacy.clearOnShutdown.history", false);
defaultPref("privacy.clearOnShutdown.downloads", false);

defaultPref("privacy.clearOnShutdown_v2.cookiesAndStorage", false);
defaultPref("privacy.clearOnShutdown_v2.browsingHistoryAndDownloads", false);
defaultPref("privacy.clearOnShutdown.cookies", false);
defaultPref("privacy.clearOnShutdown.history", false);
